AWSTemplateFormatVersion: '2010-09-09'
Description: S3 + CloudFront + ACM + Route53 template

Parameters:
  Env:
    Type: String
    Description: Environment (e.g., dev, stg, prd)
  DomainName:
    Type: String
    Description: The domain name to use (e.g., example.com)

Resources:

  # -----------------------------
  # S3 バケット: Web ホスティング用
  # バケット名は env + domain_name でユニーク化
  # -----------------------------
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${DomainName}-${Env}"
      WebsiteConfiguration:
        IndexDocument: index.html
    DeletionPolicy: Retain

  # -----------------------------
  # S3 バケットポリシー: バケット内のオブジェクトを公開
  # CloudFront からもアクセス可能
  # -----------------------------
  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub "arn:aws:s3:::${WebsiteBucket}/*"

  # -----------------------------
  # ACM 証明書: CloudFront で HTTPS を有効化するための SSL 証明書
  # DNS 検証方式を使用
  # -----------------------------
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS

  # -----------------------------
  # DNS 検証レコード: ACM 証明書の DNS 検証用
  # Route53 HostedZone に自動でレコードを追加
  # -----------------------------
  CertificateValidationRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneName: !Sub "${DomainName}."
      Name: !GetAtt Certificate.DomainValidationOptions[0].ResourceRecord.Name
      Type: !GetAtt Certificate.DomainValidationOptions[0].ResourceRecord.Type
      TTL: 300
      ResourceRecords:
        - !GetAtt Certificate.DomainValidationOptions[0].ResourceRecord.Value

  # -----------------------------
  # CloudFront ディストリビューション: S3 をオリジンに HTTPS 配信
  # ViewerCertificate には ACM 証明書を指定
  # -----------------------------
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.DomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ForwardedValues:
            QueryString: false
        ViewerCertificate:
          AcmCertificateArn: !Ref Certificate
          SslSupportMethod: sni-only

  # -----------------------------
  # Route53 HostedZone: ドメイン名管理用
  # -----------------------------
  HostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref DomainName

  # -----------------------------
  # Route53 Aレコード: CloudFront ディストリビューションに紐付け
  # CloudFront 固定 HostedZoneId を使用
  # -----------------------------
  CloudFrontRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront Hosted Zone ID (固定値)

Outputs:
  # -----------------------------
  # 出力: S3 バケット名
  # -----------------------------
  WebsiteBucketName:
    Value: !Ref WebsiteBucket

  # -----------------------------
  # 出力: CloudFront ドメイン名
  # -----------------------------
  CloudFrontDomain:
    Value: !GetAtt CloudFrontDistribution.DomainName

  # -----------------------------
  # 出力: ACM 証明書 ARN
  # -----------------------------
  CertificateArn:
    Value: !Ref Certificate