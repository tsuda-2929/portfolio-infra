<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>テトリス（回転補正済み）</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: #111;
    color: #fff;
    font-family: sans-serif;
    margin: 0;
  }
  #instructions {
    margin-bottom: 10px;
    text-align: center;
    line-height: 1.5;
  }
  canvas {
    background: #000;
    border: 2px solid #fff;
  }
</style>
</head>
<body>
<div id="instructions">
  <strong>操作方法:</strong><br>
  ←: 左移 | →: 右移 | ↑: 回転 | ↓: 早く落とす
</div>
<canvas id="game" width="240" height="400"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const ROWS = 20;
const COLS = 12;
const BLOCK = 20;

const colors = [null,'cyan','blue','orange','yellow','green','purple','red'];

const tetrominoes = [
  [],
  [[1,1,1,1]],                  // I
  [[2,0,0],[2,2,2]],            // J
  [[0,0,3],[3,3,3]],            // L
  [[4,4],[4,4]],                // O
  [[0,5,5],[5,5,0]],            // S
  [[0,6,0],[6,6,6]],            // T
  [[7,7,0],[0,7,7]]             // Z
];

function createMatrix(rows, cols) {
  const matrix = [];
  while (rows--) matrix.push(new Array(cols).fill(0));
  return matrix;
}

let arena = createMatrix(ROWS, COLS);

function drawMatrix(matrix, offset) {
  matrix.forEach((row, y) => {
    row.forEach((value, x) => {
      if (value) {
        ctx.fillStyle = colors[value];
        ctx.fillRect((x+offset.x)*BLOCK, (y+offset.y)*BLOCK, BLOCK, BLOCK);
        ctx.strokeStyle = '#111';
        ctx.strokeRect((x+offset.x)*BLOCK, (y+offset.y)*BLOCK, BLOCK, BLOCK);
      }
    });
  });
}

function merge(arena, player) {
  player.matrix.forEach((row, y) => {
    row.forEach((value, x) => {
      if (value) arena[y + player.pos.y][x + player.pos.x] = value;
    });
  });
}

function collide(arena, player) {
  const m = player.matrix;
  const o = player.pos;
  for (let y=0; y<m.length; ++y) {
    for (let x=0; x<m[y].length; ++x) {
      if (m[y][x] && (arena[y+o.y] && arena[y+o.y][x+o.x]) !== 0) {
        return true;
      }
    }
  }
  return false;
}

// 回転処理（正方形化して回転）
function rotate(matrix) {
  const N = matrix.length;
  const M = matrix[0].length;
  const rotated = [];
  for (let x=0; x<M; x++) {
    rotated[x] = [];
    for (let y=N-1; y>=0; y--) {
      rotated[x][N-1-y] = matrix[y][x] || 0;
    }
  }
  return rotated;
}

// 回転補正
function playerRotate() {
  const rotated = rotate(player.matrix);
  const pos = player.pos.x;
  let offset = 0;
  player.matrix = rotated;
  while (collide(arena, player)) {
    offset = (offset > 0 ? -offset : 1 - offset);
    player.pos.x += offset;
    if (Math.abs(offset) > player.matrix[0].length) {
      player.matrix = rotate(rotated); // 戻す
      player.pos.x = pos;
      break;
    }
  }
}

function playerReset() {
  const pieces = 'TJLOSZI';
  const type = pieces[pieces.length * Math.random() | 0];
  player.matrix = tetrominoes['TJLOSZI'.indexOf(type)+1];
  player.pos.y = 0;
  player.pos.x = (COLS/2 | 0) - (player.matrix[0].length/2 | 0);
  if (collide(arena, player)) arena.forEach(row => row.fill(0));
}

function playerDrop() {
  player.pos.y++;
  if (collide(arena, player)) {
    player.pos.y--;
    merge(arena, player);
    sweep();
    playerReset();
  }
  dropCounter = 0;
}

function sweep() {
  outer: for (let y=arena.length-1; y>=0; --y) {
    if (arena[y].every(v => v !== 0)) {
      const row = arena.splice(y, 1)[0].fill(0);
      arena.unshift(row);
      y++;
    }
  }
}

function playerMove(dir) {
  player.pos.x += dir;
  if (collide(arena, player)) player.pos.x -= dir;
}

let dropCounter = 0;
let dropInterval = 1000;
let lastTime = 0;

function update(time = 0) {
  const deltaTime = time - lastTime;
  lastTime = time;
  dropCounter += deltaTime;
  if (dropCounter > dropInterval) playerDrop();
  draw();
  requestAnimationFrame(update);
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,canvas.width, canvas.height);
  drawMatrix(arena, {x:0,y:0});
  drawMatrix(player.matrix, player.pos);
}

document.addEventListener('keydown', event => {
  if (event.key === 'ArrowLeft') playerMove(-1);
  else if (event.key === 'ArrowRight') playerMove(1);
  else if (event.key === 'ArrowDown') playerDrop();
  else if (event.key === 'ArrowUp') playerRotate();
});

const player = {
  pos: {x:0, y:0},
  matrix: null,
};

playerReset();
update();
</script>
</body>
</html>
